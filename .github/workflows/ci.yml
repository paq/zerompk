name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup toolchain install nightly --profile minimal -c rustfmt -c clippy
      - run: cargo +nightly fmt --all --check
      - run: cargo +nightly clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup toolchain install nightly --profile minimal
      - run: cargo +nightly test --locked -p zerompk --lib --tests # skip doc tests since they require the derive feature
      - run: cargo +nightly test --locked -p zerompk --features derive
      - run: cargo +nightly test --locked -p zerompk_derive
